<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя страница</title>
    <style>
        body {
            background-color: #f4ecd8; /* пергамент */
            font-family: Georgia, "Times New Roman", serif;
            margin: 20px;
            color: #3b2f2f;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 40px;
            border-bottom: 2px solid #c2a878; /* декоративная линия */
            padding-bottom: 5px;
        }

        .toc {
            background: rgba(255, 248, 220, 0.6);
            border: 1px solid #c2a878;
            padding: 15px;
            margin: 20px auto;
            max-width: 400px;
        }

        .toc a {
            text-decoration: none;
            color: #5a3e1b;
        }

        .toc a:hover {
            text-decoration: underline;
        }

        .button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            cursor: pointer;
        }

        img {
            max-width: 100%;
            display: block;
            margin: 20px auto;
            border: 3px solid #c2a878; /* рамка под стиль */
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<!-- ЯКОРЬ ДЛЯ ОГЛАВЛЕНИЯ -->
<a id="top"></a>

<!-- ЗАГОЛОВОК -->
<h1>Здесь будет твой заголовок</h1>

<!-- ОГЛАВЛЕНИЕ -->
<div class="toc">
    <strong>Оглавление:</strong>
    <ul>
        <li><a href="#topic1">Тема 1</a></li>
        <li><a href="#topic2">Тема 2</a></li>
        <li><a href="#topic3">Тема 3</a></li>
    </ul>
</div>

<!-- ===== ТЕМА 1 ===== -->
<h2 id="topic1">Тема 1</h2>

<!-- ВСТАВЬ СЮДА ТЕКСТ -->
<p>Текст по первой теме...</p>

<!-- ВСТАВЬ КАРТИНКУ -->
<img src="image1.jpg" alt="Картинка 1">

<!-- ===== ТЕМА 2 ===== -->
<h2 id="topic2">Тема 2</h2>

<p>Текст по второй теме...</p>

<img src="image2.jpg" alt="Картинка 2">

<!-- ===== ТЕМА 3 ===== -->
<h2 id="topic3">Тема 3</h2>

<p>Текст по третьей теме...</p>

<img src="image3.jpg" alt="Картинка 3">

<!-- ===== ССЫЛКА НАЗАД К ОГЛАВЛЕНИЮ ===== -->
<a href="#top" class="back">Вернуться к оглавлению ↑</a>

</body>
</html>
